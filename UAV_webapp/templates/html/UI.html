<!-- control_panel.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Управление БПЛА</title>
    <style>
        #control-panel {
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .connected { background: #d4edda; }
        .disconnected { background: #f8d7da; }
        .control-buttons {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 10px;
            margin: 20px 0;
        }
        .control-btn {
            padding: 15px;
            font-size: 16px;
            cursor: pointer;
        }
        .joystick-area {
            width: 200px;
            height: 200px;
            border: 2px solid #333;
            border-radius: 50%;
            position: relative;
            margin: 20px 0;
        }
        .joystick-knob {
            width: 40px;
            height: 40px;
            background: #007bff;
            border-radius: 50%;
            position: absolute;
            top: 80px;
            left: 80px;
        }
        .telemetry {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div id="control-panel">
        <h1>Управление БПЛА</h1>

        <div id="status" class="status disconnected">
            Не подключено
        </div>

        <div>
            <label>Выберите БПЛА:</label>
            <select id="uav-select">
                <!-- Заполнится через JS -->
            </select>
            <button onclick="connectToUAV()">Подключиться</button>
            <button onclick="disconnectFromUAV()" disabled id="disconnect-btn">Отключиться</button>
        </div>

        <div id="connected-controls" style="display: none;">
            <h2>Управление полетом</h2>

            <div class="control-buttons">
                <button class="control-btn" onclick="sendCommand('takeoff')">Взлет</button>
                <button class="control-btn" onclick="sendCommand('land')">Посадка</button>
                <button class="control-btn" onclick="sendCommand('rtl')">RTL</button>
                <button class="control-btn" onclick="sendCommand('stop')">Стоп</button>
                <button class="control-btn emergency" onclick="sendCommand('emergency')">Авария</button>
            </div>

            <h3>Ручное управление</h3>
            <div class="joystick-area" id="joystick">
                <div class="joystick-knob" id="joystick-knob"></div>
            </div>

            <div>
                <label>Скорость:</label>
                <input type="range" id="speed-slider" min="0.1" max="1.0" step="0.1" value="0.5">
                <span id="speed-value">0.5</span>
            </div>

            <div class="telemetry">
                <h3>Телеметрия</h3>
                <div id="telemetry-data">
                    Ожидание данных...
                </div>
            </div>
        </div>
    </div>
